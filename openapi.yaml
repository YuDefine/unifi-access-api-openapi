openapi: 3.1.0
info:
  title: UniFi Access API
  version: 4.0.10
  description: Unofficial OpenAPI specification for the UniFi Access API, converted from Ubiquiti's official PDF documentation.
  license:
    name: MIT
    identifier: MIT
servers:
- url: https://{host}:12445
  variables:
    host:
      default: 192.168.1.1
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    SuccessResponse:
      type: object
      properties:
        code:
          type: string
          examples:
          - SUCCESS
        msg:
          type: string
          examples:
          - success
        data:
          type: string
          examples:
          - success
    Pagination:
      type: object
      properties:
        page_num:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    User:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        full_name:
          type: string
        alias:
          type: string
        user_email:
          type: string
        email_status:
          type: string
        phone:
          type: string
        employee_number:
          type: string
        onboard_time:
          type: integer
        nfc_cards:
          type: array
          items:
            $ref: '#/components/schemas/NfcCardRef'
        license_plates:
          type: array
          items:
            $ref: '#/components/schemas/LicensePlate'
        pin_code:
          $ref: '#/components/schemas/PinCode'
        access_policy_ids:
          type: array
          items:
            type: string
        access_policies:
          type: array
          items:
            $ref: '#/components/schemas/AccessPolicySummary'
        status:
          type: string
          enum:
          - ACTIVE
          - PENDING
          - DEACTIVATED
        touch_pass:
          type: array
          items:
            $ref: '#/components/schemas/TouchPassSummary'
    NfcCardRef:
      type: object
      properties:
        id:
          type: string
          description: Display ID
        token:
          type: string
        type:
          type: string
          description: Type of the NFC card (e.g. ua_card).
    LicensePlate:
      type: object
      properties:
        id:
          type: string
        credential:
          type: string
        credential_type:
          type: string
          examples:
          - license
        credential_status:
          type: string
          enum:
          - active
          - deactivate
    PinCode:
      type: object
      properties:
        token:
          type: string
    Visitor:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        status:
          type: string
          enum:
          - UPCOMING
          - VISITED
          - VISITING
          - CANCELLED
          - NO_VISIT
          - ACTIVE
        inviter_id:
          type: string
        inviter_name:
          type: string
        mobile_phone:
          type: string
        remarks:
          type: string
        email:
          type: string
        visitor_company:
          type: string
        visit_reason:
          type: string
          enum:
          - Interview
          - Business
          - Cooperation
          - Others
        start_time:
          type: integer
        end_time:
          type: integer
        nfc_cards:
          type: array
          items:
            $ref: '#/components/schemas/NfcCardRef'
        pin_code:
          $ref: '#/components/schemas/PinCode'
        schedule_id:
          type: string
        schedule:
          $ref: '#/components/schemas/VisitorSchedule'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        license_plates:
          type: array
          items:
            $ref: '#/components/schemas/LicensePlate'
    ResourceRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - door
          - door_group
    VisitorSchedule:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        week_schedule:
          $ref: '#/components/schemas/WeekSchedule'
    WeekSchedule:
      type: object
      properties:
        sunday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        monday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        tuesday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        wednesday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        thursday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        friday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        saturday:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
    TimePeriod:
      type: object
      properties:
        start_time:
          type: string
          examples:
          - 00:00:00
        end_time:
          type: string
          examples:
          - '23:59:59'
    AccessPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        resources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                enum:
                - door
                - door_group
        schedule_id:
          type: string
    AccessPolicySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        resources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                enum:
                - door
                - door_group
        schedule_id:
          type: string
    HolidayGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        is_default:
          type: boolean
        description:
          type: string
        template_name:
          type: string
          description: Name of the holiday template.
        holidays:
          type: array
          items:
            $ref: '#/components/schemas/Holiday'
    Holiday:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        repeat:
          type: boolean
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        is_template:
          type: boolean
    HolidayGroupSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        count:
          type: integer
        is_default:
          type: boolean
    Schedule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        is_default:
          type: boolean
        type:
          type: string
        week_schedule:
          $ref: '#/components/schemas/WeekSchedule'
        holiday_schedule:
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        holiday_group_id:
          type: string
        holiday_group:
          $ref: '#/components/schemas/HolidayGroup'
    NfcCard:
      type: object
      properties:
        token:
          type: string
        display_id:
          type: string
        status:
          type: string
          enum:
          - assigned
          - pending
          - disable
          - deleted
          - loss
        alias:
          type: string
        note:
          type: string
          description: Note of the NFC card.
        card_type:
          type: string
        user_id:
          type: string
        user_type:
          type: string
          enum:
          - USER
          - VISITOR
        user:
          $ref: '#/components/schemas/NfcCardUser'
    NfcCardUser:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        name:
          type: string
        avatar:
          type: string
          description: URL to the user's avatar image.
    TouchPass:
      type: object
      properties:
        id:
          type: string
        card_id:
          type: string
        card_name:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - PENDING
          - SUSPENDED
          - INACTIVE
          - EXPIRED
        last_activity:
          type: string
        user_id:
          type: string
        user_name:
          type: string
        user_email:
          type: string
        user_avatar:
          type: string
        user_status:
          type: string
        activated_at:
          type: object
          description: Timestamp when the credential is activated.
        expired_at:
          type: object
          description: Timestamp when the credential expires.
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/TouchPassBundle'
    TouchPassBundle:
      type: object
      properties:
        bundle_id:
          type: string
        bundle_status:
          type: string
          enum:
          - ACTIVE
          - SUSPENDED
        device_id:
          type: string
        device_name:
          type: string
        device_type:
          type: integer
        source:
          type: string
          enum:
          - google
          - apple
    TouchPassSummary:
      type: object
      properties:
        id:
          type: string
        card_id:
          type: string
        card_name:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - PENDING
          - SUSPENDED
          - INACTIVE
          - EXPIRED
    DoorGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - access
          - building
        resources:
          type: array
          items:
            $ref: '#/components/schemas/DoorRef'
    DoorRef:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
    Door:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
        floor_id:
          type: string
        type:
          type: string
        is_bind_hub:
          type: boolean
        door_lock_relay_status:
          type: string
          enum:
          - lock
          - unlock
        door_position_status:
          type:
          - string
          - 'null'
    DoorTopology:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - building
          - access
        resource_topologies:
          type: array
          items:
            $ref: '#/components/schemas/FloorTopology'
    FloorTopology:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        is_bind_hub:
          type: boolean
        resources:
          type: array
          items:
            $ref: '#/components/schemas/DoorRef'
    LockRule:
      type: object
      properties:
        type:
          type: string
          enum:
          - schedule
          - keep_lock
          - keep_unlock
          - custom
          - lock_early
        ended_time:
          type: integer
    EmergencyStatus:
      type: object
      properties:
        lockdown:
          type: boolean
        evacuation:
          type: boolean
    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          description: Device model type (e.g., UA-G2-PRO, UAH-DOOR).
        alias:
          type: string
        capabilities:
          type: array
          items:
            type: string
          description: List of device capabilities (e.g., pin_code, nfc, face, qr_code).
        connected_uah_id:
          type: string
          description: MAC address of the connected UA Hub (empty for hubs themselves).
        is_adopted:
          type: boolean
        is_connected:
          type: boolean
        is_managed:
          type: boolean
        is_online:
          type: boolean
        location_id:
          type: string
          description: Door ID the device is bound to.
    DeviceAccessMethods:
      type: object
      properties:
        nfc:
          type: object
          properties:
            enabled:
              type: string
        bt_tap:
          type: object
          properties:
            enabled:
              type: string
        bt_button:
          type: object
          properties:
            enabled:
              type: string
        bt_shake:
          type: object
          properties:
            enabled:
              type: string
        mobile_wave:
          type: object
          properties:
            enabled:
              type: string
        pin_code:
          type: object
          properties:
            enabled:
              type: string
            pin_code_shuffle:
              type: string
        face:
          type: object
          properties:
            enabled:
              type: string
            anti_spoofing_level:
              type: string
              enum:
              - high
              - medium
              - "no"
            detect_distance:
              type: string
              enum:
              - near
              - medium
              - far
        wave:
          type: object
          properties:
            enabled:
              type: string
        qr_code:
          type: object
          properties:
            enabled:
              type: string
        touch_pass:
          type: object
          properties:
            enabled:
              type: string
    SystemLogEntry:
      type: object
      properties:
        '@timestamp':
          type: string
          description: Timestamp of the log entry.
        _id:
          type: string
        _source:
          type: object
          properties:
            actor:
              type: object
              description: Information about the event operator.
              properties:
                id:
                  type: string
                type:
                  type: string
                display_name:
                  type: string
                alternate_id:
                  type: string
                alternate_name:
                  type: string
                avatar:
                  type: string
                sso_picture:
                  type: string
            event:
              type: object
              description: Basic information about the event.
              properties:
                type:
                  type: string
                display_message:
                  type: string
                result:
                  type: string
                published:
                  type: integer
                reason:
                  type: string
                tag:
                  type: string
            authentication:
              type: object
              description: Certification information.
              properties:
                credential_provider:
                  type: string
                issuer:
                  type: string
            target:
              type: array
              description: Additional information associated with the event.
              items:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                  display_name:
                    type: string
                  alternate_id:
                    type: string
                  alternate_name:
                    type: string
            tag:
              type: string
    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
        endpoint:
          type: string
        name:
          type: string
        secret:
          type: string
        events:
          type: array
          items:
            type: string
        headers:
          type: object
          additionalProperties:
            type: string
    UserGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
        up_id:
          type: string
        up_ids:
          type: array
          items:
            type: string
    UserSummary:
      type: object
      properties:
        alias:
          type: string
        avatar_relative_path:
          type: string
        email:
          type: string
        email_status:
          type: string
        employee_number:
          type: string
        first_name:
          type: string
        full_name:
          type: string
        id:
          type: string
        last_name:
          type: string
        onboard_time:
          type: integer
        phone:
          type: string
        status:
          type: string
        user_email:
          type: string
        username:
          type: string
    IdentityResource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        deleted:
          type: boolean
    IdentityAssignments:
      type: object
      properties:
        ev_station:
          type: array
          items:
            $ref: '#/components/schemas/IdentityResource'
        vpn:
          type: array
          items:
            $ref: '#/components/schemas/IdentityResource'
        wifi:
          type: array
          items:
            $ref: '#/components/schemas/IdentityResource'
tags:
- name: User
  description: User management operations
- name: User Group
  description: User group management operations
- name: Visitor
  description: Visitor management operations
- name: Access Policy
  description: Access policy management operations
- name: Holiday Group
  description: Holiday group management operations
- name: Schedule
  description: Schedule management operations
- name: Credential
  description: Credential management operations
- name: Space
  description: Space (doors and door groups) management operations
- name: Device
  description: Device management operations
- name: System Log
  description: System log operations
- name: UniFi Identity
  description: UniFi Identity integration operations
- name: Webhook
  description: Webhook notification management operations
- name: API Server
  description: API server configuration operations
x-tagGroups:
- name: User Management
  tags:
  - User
  - User Group
- name: Visitor Management
  tags:
  - Visitor
- name: Access Policy
  tags:
  - Access Policy
  - Holiday Group
  - Schedule
- name: Credential Management
  tags:
  - Credential
- name: Space Management
  tags:
  - Space
- name: Device Management
  tags:
  - Device
- name: System
  tags:
  - System Log
  - UniFi Identity
  - Webhook
  - API Server
paths:
  /api/v1/developer/users:
    post:
      tags:
      - User
      summary: User Registration
      operationId: createUser
      security:
      - bearerAuth: []
      x-permission-key: edit:user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - first_name
              - last_name
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                user_email:
                  type: string
                employee_number:
                  type: string
                onboard_time:
                  type: integer
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      first_name:
                        type: string
                      last_name:
                        type: string
                      id:
                        type: string
                      user_email:
                        type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      tags:
      - User
      summary: Fetch All Users
      operationId: fetchAllUsers
      security:
      - bearerAuth: []
      x-permission-key: view:user
      parameters:
      - name: expand[]
        in: query
        required: false
        schema:
          type: string
      - name: page_num
        in: query
        required: false
        schema:
          type: string
      - name: page_size
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    type: object
                    properties:
                      page_num:
                        type: integer
                      page_size:
                        type: integer
                      total:
                        type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/developer/users/{id}:
    put:
      tags:
      - User
      summary: Update User
      operationId: updateUser
      security:
      - bearerAuth: []
      x-permission-key: edit:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                user_email:
                  type: string
                employee_number:
                  type: string
                onboard_time:
                  type: integer
                status:
                  type: string
                  enum:
                  - ACTIVE
                  - DEACTIVATED
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
                  data:
                    type: 'null'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      tags:
      - User
      summary: Fetch User
      operationId: fetchUser
      security:
      - bearerAuth: []
      x-permission-key: view:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: expand[]
        in: query
        required: false
        schema:
          type: string
          enum:
          - access_policy
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags:
      - User
      summary: Delete User
      operationId: deleteUser
      security:
      - bearerAuth: []
      x-permission-key: edit:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/developer/users/{id}/access_policies:
    put:
      tags:
      - User
      summary: Assign Access Policy to User
      operationId: assignAccessPolicyToUser
      security:
      - bearerAuth: []
      x-permission-key: edit:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - access_policy_ids
              properties:
                access_policy_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Access policy assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      tags:
      - User
      summary: Fetch Access Policies Assigned to User
      operationId: fetchUserAccessPolicies
      security:
      - bearerAuth: []
      x-permission-key: view:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: only_user_policies
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Access policies retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  msg:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessPolicy'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/developer/users/{id}/nfc_cards:
    put:
      tags:
      - User
      summary: Assign NFC Card to User
      operationId: assignNfcCardToUser
      security:
      - bearerAuth: []
      x-permission-key: edit:user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
